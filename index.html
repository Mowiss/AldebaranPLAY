                            <p class="text-slate-300 font-medium mb-6">Combien de Bastos voulez-vous transférer vers votre bourse ?<br><span class="text-sm text-slate-500">(Maximum : ${state.character.bankBastos} ₿)</span></p>
                            <div class="bg-slate-900 p-4 rounded-xl border border-slate-700 mb-6 relative">
                                <input type="number" value="${state.transferBastosAmount}" data-action="updateTransferBastosAmount" placeholder="0" class="w-full bg-slate-800 text-white border border-slate-600 rounded-lg p-4 text-center text-3xl font-bold outline-none focus:border-yellow-500 pr-8" min="1" max="${state.character.bankBastos}" autofocus />
                                <span class="absolute right-8 top-1/2 -translate-y-1/2 text-yellow-500 font-bold text-2xl">₿</span>
                            </div>
                            <div class="flex gap-4">
                                <button data-action="closeModal" data-payload="transferBastosModalOpen" class="w-1/2 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl transition-colors">Annuler</button>
                                <button data-action="confirmTransferBastos" class="w-1/2 bg-yellow-600 hover:bg-yellow-500 shadow-[0_4px_0_#ca8a04] active:shadow-[0_0px_0_#ca8a04] active:translate-y-1 text-white font-bold py-3 rounded-xl transition-all">Valider</button>
                            </div>
                        </div>
                    </div>`;
                }

                if (state.newItemModalOpen) {
                    m += `
                    <div class="fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-4 backdrop-blur-sm">
                        <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl max-w-md w-full border-2 border-indigo-500 text-center">
                            <h3 class="text-2xl font-bold mb-6 text-indigo-400 uppercase tracking-widest">Type d'objet</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                                
                                <!-- Encart centralisé pour les ARMES -->
                                <div class="col-span-1 sm:col-span-2 bg-red-900/40 p-4 rounded-xl border border-red-500 shadow-md flex flex-col items-center justify-center gap-3">
                                    <div class="flex items-center gap-2 text-red-100">
                                        <span class="text-3xl">💥</span> <span class="text-lg font-bold uppercase tracking-wider">ARME</span>
                                    </div>
                                    <div class="flex gap-2 w-full mt-1">
                                        <button data-action="createItem" data-payload="weapon.1" class="flex-1 bg-red-800 hover:bg-red-600 text-white font-bold py-2 px-1 rounded-lg transition-colors text-[10px] sm:text-xs flex flex-col items-center justify-center gap-1 shadow"><span class="text-xl">🖐️</span> 1 MAIN</button>
                                        <button data-action="createItem" data-payload="weapon.2" class="flex-1 bg-red-800 hover:bg-red-600 text-white font-bold py-2 px-1 rounded-lg transition-colors text-[10px] sm:text-xs flex flex-col items-center justify-center gap-1 shadow"><span class="text-xl">🤲</span> 2 MAINS</button>
                                    </div>
                                </div>
                                
                                <button data-action="createItem" data-payload="armor" class="bg-purple-900/40 hover:bg-purple-600 text-purple-100 font-bold py-4 px-4 rounded-xl border border-purple-500 transition-colors shadow-md flex flex-col items-center justify-center gap-2 text-lg">
                                    <span class="text-3xl">🛡️</span> <span class="text-xs uppercase tracking-wider">Armure</span>
                                </button>
                                <button data-action="createItem" data-payload="backpack" class="bg-amber-900/40 hover:bg-amber-600 text-amber-100 font-bold py-4 px-4 rounded-xl border border-amber-500 transition-colors shadow-md flex flex-col items-center justify-center gap-2 text-lg">
                                    <span class="text-3xl">🎒</span> <span class="text-xs uppercase tracking-wider">Sac à dos</span>
                                </button>
                                <button data-action="createItem" data-payload="misc" class="col-span-1 sm:col-span-2 bg-slate-700 hover:bg-slate-500 text-slate-100 font-bold py-4 px-4 rounded-xl border border-slate-500 transition-colors shadow-md flex flex-col items-center justify-center gap-2 text-lg">
                                    <span class="text-3xl">🏷️</span> <span class="text-xs uppercase tracking-wider">Divers</span>
                                </button>
                            </div>
                            <button data-action="closeModal" data-payload="newItemModalOpen" class="w-full bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-4 rounded-xl transition-colors">Annuler</button>
                        </div>
                    </div>`;
                }

                if (state.noteImagePreviewOpen) {
                    m += `
                    <div class="fixed inset-0 bg-black/95 z-[70] flex items-center justify-center p-4 backdrop-blur-md" data-action="closeModal" data-payload="noteImagePreviewOpen">
                        <div class="relative max-w-6xl w-full max-h-[90vh] flex items-center justify-center">
                            <button data-action="closeModal" data-payload="noteImagePreviewOpen" class="absolute -top-12 right-0 md:-right-12 bg-slate-800 hover:bg-red-600 text-white w-10 h-10 rounded-full font-bold transition-colors border border-slate-600 shadow-xl z-10 flex items-center justify-center">✕</button>
                            <img src="${state.currentPreviewImage}" class="max-w-full max-h-[85vh] object-contain rounded-xl border border-slate-700 shadow-2xl" onclick="event.stopPropagation()" />
                        </div>
                    </div>`;
                }

                if (state.diceResult) {
                    const isSuccess = state.diceResult.successes > 0;
                    m += `
                    <div class="fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-4 backdrop-blur-sm" data-action="closeModal" data-payload="diceResult">
                        <div class="bg-slate-800 p-8 rounded-3xl border-4 ${isSuccess ? 'border-green-500 shadow-[0_0_30px_rgba(34,197,94,0.3)]' : 'border-red-500 shadow-[0_0_30px_rgba(239,68,68,0.3)]'} text-center space-y-6 max-w-lg w-full transform transition-all scale-100" onclick="event.stopPropagation()">
                            <h2 class="text-3xl font-bold uppercase tracking-wider text-white">${state.diceResult.statName}</h2>
                            <p class="text-slate-400 font-bold">SEUIL REQUIS : ${state.diceResult.threshold}+</p>
                            
                            <div class="flex justify-center gap-3 flex-wrap py-4 bg-slate-900 rounded-2xl border border-slate-700">
                                ${state.diceResult.rolls.map(r => {
                                    let style = "bg-slate-700 text-slate-300 border border-slate-600";
                                    if (r === 10) style = "bg-yellow-500 text-black border-2 border-yellow-300 shadow-[0_0_15px_#eab308] animate-pulse scale-110";
                                    else if (r >= state.diceResult.threshold) style = "bg-green-600 text-white border-2 border-green-400 shadow-[0_0_10px_#16a34a]";
                                    else if (r === 1) style = "bg-red-600 text-white border-2 border-red-400 opacity-80";
                                    
                                    return `<div class="w-14 h-14 flex items-center justify-center rounded-xl font-bold text-2xl ${style}">${r}</div>`;
                                }).join('')}
                            </div>
                            
                            <div class="py-2">
                                <div class="text-5xl font-aldebaran ${isSuccess ? 'text-green-400' : 'text-red-500 drop-shadow-md'}">${state.diceResult.successes} SUCCÈS</div>
                            </div>
                            
                            <button data-action="closeModal" data-payload="diceResult" class="w-full ${isSuccess ? 'bg-green-600 hover:bg-green-500 shadow-[0_4px_0_#166534] active:shadow-[0_0px_0_#166534]' : 'bg-red-600 hover:bg-red-500 shadow-[0_4px_0_#991b1b] active:shadow-[0_0px_0_#991b1b]'} active:translate-y-1 text-white p-4 rounded-xl font-bold text-xl uppercase tracking-widest transition-all">CONTINUER</button>
                        </div>
                    </div>`;
                }

                return m;
            }

            function attachEventListeners() {
                document.querySelectorAll('[data-action]').forEach(el => {
                    let eventType = 'click';
                    if (el.tagName === 'FORM') {
                        eventType = 'submit';
                    } else if (el.tagName === 'INPUT' || el.tagName === 'SELECT' || el.tagName === 'TEXTAREA') {
                        eventType = 'change';
                    }
                    
                    el.removeEventListener(eventType, handleEvent);
                    el.addEventListener(eventType, handleEvent);
                });
            }

            render();
        });
    </script>
</body>
</html>
